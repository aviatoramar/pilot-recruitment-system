<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aviation Math Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root { --cobalt:#1e90ff; --slate:#0f172a; }
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:linear-gradient(135deg,#dbeafe,#e0f2fe);
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
}
.card{
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  width:95%;max-width:900px;
  padding:50px;border-radius:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
}
.hidden{display:none}
.btn{padding:18px;border-radius:14px;font-weight:700;border:none;cursor:pointer}
.btn-test{background:#0f172a;color:#fff}
.btn-practice{background:#fff;border:2px solid #cbd5e1}
.q-text{font-size:1.5rem;font-weight:700;margin:20px 0;line-height:1.4}
input{width:100%;padding:16px;font-size:1.3rem;border-radius:12px;border:2px solid #cbd5e1}
#timer{
  position:fixed;top:20px;left:20px;
  font-family:'JetBrains Mono';font-weight:800;
  color:#dc2626;background:#fff;padding:10px 16px;border-radius:12px
}
.mistake-box{
  background:#fff1f2;border-left:6px solid #ef4444;
  padding:14px;border-radius:10px;margin-bottom:12px
}
</style>
</head>
<body>

<div id="timer" class="hidden">20:00</div>

<div id="main-menu" class="card">
  <h1 style="text-align:center;margin-bottom:30px">Aviation Mathematics</h1>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px">
    <div style="background:#fff;padding:20px;border-radius:16px;border-left:6px solid var(--cobalt)">
      <b>Test Overview</b>
      <p>24 questions. Percentage scoring with mistake review.</p>
    </div>
    <div style="background:#fff;padding:20px;border-radius:16px;border-left:6px solid var(--cobalt)">
      <b>Practice Overview</b>
      <p>Practice mode mixes all three sets in round-robin order.</p>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <button class="btn btn-test" onclick="startTest()">START TEST</button>
    <button class="btn btn-practice" onclick="startPractice()">START PRACTICE</button>
  </div>
</div>

<div id="test-page" class="card hidden">
  <div id="q-counter" style="font-weight:800;color:#1e90ff;margin-bottom:10px"></div>
  <div id="question-display" class="q-text"></div>
  <input id="answer-input" placeholder="Enter your answer" oninput="checkInput()"/>
  <button id="action-btn" class="btn btn-test" onclick="handleAction()" disabled>CONFIRM</button>
</div>

<div id="score-page" class="card hidden">
  <h1 style="text-align:center">Test Analysis</h1>
  <div id="final-percent" style="font-size:4rem;font-weight:800;text-align:center;color:#1e90ff"></div>
  <div id="final-count" style="text-align:center;font-weight:600;margin-bottom:20px"></div>
  <div id="mistake-list"></div>
  <button class="btn btn-test" style="display:block;margin:20px auto 0" onclick="location.reload()">RESTART PORTAL</button>
</div>

<script>
// ---------- QUESTION SETS ----------
const set1 = [
  { q: "0.92 × 1000", a: 920 },
  { q: "237 + 149 + 4737", a: 5123 },
  { q: "3336 minus 2227", a: 1109 },
  { q: "(410 + 130) / 3", a: 180 },
  { q: "Two sides of a triangle are 8 cm and 6 cm. What is the length of its hypotenuse?", a: 10 },
  { q: "6x + 21 = 13y find the value of y when x = 3.", a: 3 },
  { q: "346736 divided by 13", a: 26672 },
  { q: "An aircraft has 40 first class seats and 120 economy seats. What is the percentage of first class seats?", a: 25 },
  { q: "What is the total weight of 101 passengers weighing 91 kg each?", a: 9191 },
  { q: "Concorde flies 2250 miles in 2 hours 15 minutes. What is average speed?", a: 1000 },
  { q: "Deicing fluid is mixed in a ratio of 75% glycol : 25% water. What total volume of deicing fluid can be mixed from 300 litres of glycol?", a: 400 },
  { q: "An aircraft descends 3000 feet every ten miles. How many miles will it travel while descending from 35000 feet to 8000 feet?", a: 90 },
  { q: "The speed of sound at sea level is 760 mph (Mach = 1.0). What is the speed in mph of an aircraft flying at mach 0.7 at sea level?", a: 532 },
  { q: "An aircraft turn right from a course of 330 degrees to 175 degrees. Through how many degrees does it turn to change course?", a: 205 },
  { q: "(Refer to table A) What is the landing distance required at 66000 kgs with flap 40 and the thrust reverser inoperative?", a: 2500 },
  { q: "(Refer to table A) For a landing with flaps 15 and the auto spoiler inoperative what is the weight for landing on 1860 m runway?", a: 46 },
  { q: "(Refer to graph B) What is the 500 ft/min rate of climb ceiling at ISA + 20 for a take-off weight of 39500 kgs?", a: 29 },
  { q: "(Refer to graph B) An aircraft is to fly at its 500 ft/min of climb at 32000 ft. At ISA what will be its take-off weight?", a: 41000 },
  { q: "An aircraft flies at a constant speed for 20 minutes due west and 20 minutes due north. Assuming there is no wind what will be the aircraft’s compass heading to return to its starting point?", a: 135 },
  { q: "An aircraft uses fuel at 50 kg/minute while waiting to land. It has 25000 kg of fuel in the fuel tanks. 900 kg is needed for the landing. For how many minutes can the aircraft wait before landing?", a: 482 },
  { q: "An aircraft takes off from airport A at 2306 GMT and lands at airport B at 0551 GMT. What is the total flight time in minutes?", a: 405 },
  { q: "Two aircraft take off from A and B at 1300 hrs and fly directly towards each other. The aircraft from A flies at 200 km/hr and the aircraft from B flies at 100 km/hr. If the distance from A to B is 300 km how many km from B will they be when they meet?", a: 100 },
  { q: "An aircraft flies for 1600 km at a speed of 600 mph. One mile = 8/5 km. How many minutes will it take it to fly the 1600 kms?", a: 100 },
  { q: "At 32 degree F a centigrade thermometer will read 0 degrees C. 1 degree F = 32 + 9/5 degree C. What will a centigrade thermometer read at 59 degree F?", a: 15 }
];

const set2 = [
  { q: "0.83 x 10000", a: 8300 },
  { q: "137 + 249 + 4777", a: 5163 },
  { q: "4443 minus 3334", a: 1109 },
  { q: "( 310 + 110 ) / 3", a: 140 },
  { q: "Two sides of a triangle are 6 cm and 8 cm. What is the length of its hypotenuse?", a: 10 },
  { q: "2x + 13 = 21y Find the value of y when x = 4", a: (2*4+13)/21 },
  { q: "346788 divided by 13", a: 26676 },
  { q: "An aircraft has 20 first class seats and 80 economy seats . What is the percentage of first class seats?", a: 20 },
  { q: "What is the total weight of 101 passengers weighing 81 kg each?", a: 8181 },
  { q: "Concorde flies 3150 miles in 3 hours 30 minutes. What is its average speed?", a: 900 },
  { q: "Deicing fluid is mixed in a ratio of 75% glycol : 25% water. What total volume of deicing fluid can be mixed from 210 litres of glycol?", a: 280 },
  { q: "An aircraft descends 3000 feet every ten miles. How many miles will it travel while descending from 37000 feet to 13000 feet?", a: 80 },
  { q: "The speed of sound at sea level is 760 mph (mach = 1.0) What is the speed in mph of an aircraft flying at mach = 0.6 at sea level?", a: 456 },
  { q: "An aircraft turns right from a course of 220 degrees to a course of 010 degrees. Through how many degrees does it turn to change course?", a: 150 },
  { q: "(Refer to table A) What is the landing distance required at 62000Kgs with flap 15 and the auto-spoiler inoperative?", a: 2760 },
  { q: "(Refer to table A) For a normal landing with flap 40 what is the weight for landing on a 1690m runway?", a: 54000 },
  { q: "(Refer to graph B) What is the 500ft/min rate of climb ceiling at ISA for a take-off weight of 41000 Kgs?", a: 32000 },
  { q: "(Refer to graph B) An aircraft is to fly at its 500ft/min rate of climb ceiling of 29000ft. At ISA +20 what will be its take-off weight?", a: 39500 },
  { q: "An aircraft flies at a constant speed for 30 minutes due north and then for 30 minutes due east. Assuming there is no wind what will be the aircraft's compass heading to return to its starting point?", a: 225 },
  { q: "An aircraft uses fuel at 60kg / minute while waiting to land. It has 2600kg of fuel in the fuel tanks. 800kg is needed for the landing. For how many minutes can the aircraft wait before landing?", a: 30 },
  { q: "An aircraft takes off from airport A at 2209 GMT and lands at airport B at 0605 GMT. What is the total flight time in minutes?", a: 476 },
  { q: "Two aircraft take off from A and B at 10:00 hrs and fly directly towards each other. The aircraft from A flies at 100 km/hr and the aircraft from B at 200 km/hr. If the distance from A to B is 120 km how many km from A will they be when they meet?", a: 40 },
  { q: "An aircraft flies for 1200 km at a speed of 500 mph. One mile = 8/5 km. How many MINUTES will it take to fly the 1200 kms?", a: 90 },
  { q: "At 32 degrees F a centigrade thermometer will read 0 degrees C. 1 degree F = 32+9/5 degrees C What will a centigrade thermometer read at 86 degrees F?", a: 30 }
];

const set3 = [
  { q: "0.79 x 1000", a: 790 },
  { q: "237 + 249 + 4767", a: 5253 },
  { q: "5553 minus 4445", a: 1108 },
  { q: "(210 + 120 ) / 3", a: 110 },
  { q: "Two sides of a triangle are 3 cm and 4 cm. What is the length of its hypotenuse?", a: 5 },
  { q: "4x + 26 = 21y Find the value of y when x = 4", a: (4*4+26)/21 },
  { q: "346762 divided by 13", a: 26674 },
  { q: "An aircraft has 30 first class seats and 120 economy seats . What is the percentage of first class seats?", a: 20 },
  { q: "What is the total weight of 101 passengers weighing 71 kg each?", a: 7171 },
  { q: "Concorde flies 2000 miles in 2 hours 30 minutes. What is its average speed?", a: 800 },
  { q: "Deicing fluid is mixed in a ratio of 75% glycol : 25% water. What total volume of deicing fluid can be mixed from 150 litres of glycol?", a: 200 },
  { q: "An aircraft descends 3000 feet every ten miles. How many miles will it travel while descending from 39000 feet to 18000 feet?", a: 70 },
  { q: "The speed of sound at sea level is 760 mph (mach = 1.0) What is the speed in mph of an aircraft flying at mach = 0.4 at sea level?", a: 304 },
  { q: "An aircraft turns left from a course of 220 degrees to a course of 350 degrees. Through how many degrees does it turn to change course?", a: 230 },
  { q: "(Refer to table A) What is the landing distance required at 58000Kgs with flap 40 and anti skid inoperative?", a: 3310 },
  { q: "(Refer to table A) For a landing with flaps 15 and the auto spoiler inoperative what is the weight for landing on a 2760m runway?", a: 62 },
  { q: "(Refer to graph B) What is the 500ft/min rate of climb ceiling at ISA +30 for a take-off weight of 38500 Kgs?", a: 28 },
  { q: "(Refer to graph B) An aircraft is to fly at its 500ft/min rate of climb ceiling of 27000 ft. At ISA +20 what will be its take-off weight?", a: 43000 },
  { q: "An aircraft flies at a constant speed for 15 minutes due south and then for 15 minutes due west. Assuming there is no wind what will be the aircraft's compass heading to return to its starting point?", a: 45 },
  { q: "An aircraft uses fuel at 40kg / minute while waiting to land. It has 1800kg of fuel in the fuel tanks. 600kg is needed for the landing. For how many minutes can the aircraft wait before landing?", a: 30 },
  { q: "An aircraft takes off from airport A at 2239 GMT and lands at airport B at 0505 GMT. What is the total flight time in minutes?", a: 386 },
  { q: "Two aircraft take off from A and B at 1100 hrs and fly directly towards each other. The aircraft from A flies at 100 km/hr and the aircraft from B at 300 km/hr. If the distance from A to B is 200 km how many km from A will they be when they meet?", a: 50 },
  { q: "An aircraft flies for 1600 km at a speed of 500 mph. One mile = 8/5 km. How many MINUTES will it take to fly the 1600 kms?", a: 120 },
  { q: "At 32 degrees F a centigrade thermometer will read 0 degrees C. 1 degree F = 32+9/5 degrees C What will a centigrade thermometer read at 68 degrees F?", a: 20 }
];

// ---------- RANDOM SET PICKER ----------
let lastSetIndex = -1;
function pickRandomDifferentSet(){
  let idx;
  do { idx = Math.floor(Math.random() * 3); } 
  while (idx === lastSetIndex);
  lastSetIndex = idx;
  return idx;
}

// ---------- APP STATE ----------
let active=[], i=0, score=0, timerInt, mistakes=[];

// ---------- MODES ----------
function startTest(){
  i=0; score=0; mistakes=[];
  document.getElementById("main-menu").classList.add("hidden");
  document.getElementById("test-page").classList.remove("hidden");

  const idx = pickRandomDifferentSet();
  active = idx === 0 ? [...set1] : idx === 1 ? [...set2] : [...set3];

  startTimer(1200);
  render();
}

function startPractice(){
  i=0; score=0;
  document.getElementById("main-menu").classList.add("hidden");
  document.getElementById("test-page").classList.remove("hidden");

  const mixed = [];
  const minLen = Math.min(set1.length, set2.length, set3.length);
  for(let idx=0; idx<minLen; idx++){
    mixed.push(set1[idx], set2[idx], set3[idx]);
  }
  active = mixed;
  render();
}

// ---------- CORE ----------
function render(){
  document.getElementById("q-counter").innerText = (i+1) + " / " + active.length;
  document.getElementById("question-display").innerText = active[i].q;
  document.getElementById("answer-input").value = "";
  document.getElementById("action-btn").disabled = true;
}
function checkInput(){
  document.getElementById("action-btn").disabled = document.getElementById("answer-input").value.trim()==="";
}
function handleAction(){
  const userVal = document.getElementById("answer-input").value.trim();
  const u = parseFloat(userVal);
  const c = active[i].a;

  if(c !== null){
    if(!isNaN(u) && Math.abs(u - c) < 0.5){
      score++;
    } else {
      mistakes.push({ q: active[i].q, user: userVal || "(blank)", correct: c });
    }
  }

  i++;
  if(i < active.length) render();
  else finish();
}
function finish(){
  clearInterval(timerInt);
  document.getElementById("test-page").classList.add("hidden");
  document.getElementById("timer").classList.add("hidden");
  document.getElementById("score-page").classList.remove("hidden");

  const percent = Math.round((score / active.length) * 100);
  document.getElementById("final-percent").innerText = percent + "%";
  document.getElementById("final-count").innerText = score + " / " + active.length + " correct";

  const list = document.getElementById("mistake-list");
  list.innerHTML = mistakes.length
    ? "<h3>Mistake Review</h3>"
    : "<h3>Perfect Score — No mistakes 🎉</h3>";

  mistakes.forEach(m=>{
    const div = document.createElement("div");
    div.className = "mistake-box";
    div.innerHTML = `<b>Q:</b> ${m.q}<br>
                     <b>Your Answer:</b> ${m.user}<br>
                     <b>Correct:</b> <span style="color:#15803d;font-weight:700">${m.correct}</span>`;
    list.appendChild(div);
  });
}
function startTimer(seconds){
  let t=seconds;
  const el=document.getElementById("timer");
  el.classList.remove("hidden");
  timerInt=setInterval(()=>{
    let m=Math.floor(t/60), s=t%60;
    el.innerText = m + ":" + (s<10?"0"+s:s);
    if(--t < 0) finish();
  },1000);
}
</script>
</body>
</html>
