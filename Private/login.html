<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COMPASS // PILOT RECRUITMENT SYSTEM</title>
    <style>
        :root { --navy: #0f172a; --airline-blue: #2563eb; --lite-bg: #f8fafc; }
        body {
            margin: 0; background: var(--lite-bg); font-family: 'Helvetica Neue', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            background-image: linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(37, 99, 235, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .login-container {
            background: white; padding: 60px; width: 400px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-radius: 4px;
        }
        h1 { 
            color: var(--navy); font-size: 2.8rem; margin: 0; letter-spacing: 2px;
            font-weight: 900; text-transform: uppercase;
        }
        .line { height: 4px; background: var(--airline-blue); width: 100%; margin: 15px 0; }
        .sub-header { color: var(--airline-blue); letter-spacing: 4px; font-weight: bold; font-size: 0.9rem; margin-bottom: 40px; }
        
        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 8px; letter-spacing: 1px; }
        input {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 4px;
            box-sizing: border-box; font-size: 1rem; background: #fdfdfd;
        }
        button {
            width: 100%; padding: 16px; background: var(--navy); color: white;
            border: none; font-weight: bold; letter-spacing: 2px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: var(--airline-blue); }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>COMPASS TEST</h1>
        <div class="line"></div>
        <div class="sub-header">PILOT RECRUITMENT SYSTEM</div>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>IDENTIFICATION NAME</label>
                <input type="text" name="username" placeholder="Enter Full Name" required>
            </div>
            <div class="form-group">
                <label>SECURITY ACCESS KEY</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Enter Test Terminal</button>
        </form>
    </div>
</body>
</html>
